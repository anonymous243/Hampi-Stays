<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle in forest green -->
  <circle cx="32" cy="32" r="32" fill="#072b1d"/>

  <!-- Temple/Gopuram silhouette in terracotta -->
  <!-- Base platform -->
  <rect x="10" y="50" width="44" height="5" rx="1" fill="#d44c30"/>

  <!-- Main entrance arch -->
  <rect x="27" y="36" width="10" height="14" rx="1" fill="#072b1d"/>
  <path d="M27 36 Q32 30 37 36" fill="#d44c30"/>

  <!-- First tier -->
  <rect x="18" y="34" width="28" height="6" rx="1" fill="#d44c30"/>

  <!-- Second tier (narrower) -->
  <rect x="22" y="26" width="20" height="8" rx="1" fill="#e6664a"/>

  <!-- Third tier (even narrower) -->
  <rect x="26" y="19" width="12" height="7" rx="1" fill="#d44c30"/>

  <!-- Fourth tier -->
  <rect x="28" y="13" width="8" height="6" rx="1" fill="#e6664a"/>

  <!-- Kalasha (pinnacle) -->
  <ellipse cx="32" cy="10" rx="3" ry="4" fill="#d44c30"/>
  <circle cx="32" cy="7" r="1.5" fill="#f08b74"/>

  <!-- Decorative dots on tiers -->
  <circle cx="21" cy="37" r="1" fill="#f08b74"/>
  <circle cx="43" cy="37" r="1" fill="#f08b74"/>
  <circle cx="25" cy="29" r="1" fill="#f08b74"/>
  <circle cx="39" cy="29" r="1" fill="#f08b74"/>
</svg>